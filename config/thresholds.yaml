# Macro OS - Threshold Configuration
# All magic numbers live here. No hardcoded thresholds in code.

regime:
  risk_on:
    # === ZIRP 陷阱拆除 (2026-07-18) ===
    # 废弃旧参数 tips_yield_max: 0.5 — 该阈值是 2010-2021 零利率时代的遗留产物，
    # 在 2026 年真实利率 2.3% 的环境下将导致系统永远无法进入 RISK_ON。
    # 保留注释供审计追溯，不删除以防向后兼容性需求。

    # 硬天花板：绝对水平过高时一票否决 (防恶性通胀误判)
    tips_absolute_max: 2.5        # 单位：百分比 (e.g., 2.5 表示 2.5%)

    # 边际变化信号 (满足任一即可触发，需满足 min_signals_required)
    tips_roc_60d_threshold: -0.15 # 60日变化率低于 -15% (利率快速下行)
    tips_percentile_2y: 0.25      # 2年滚动分位低于 25% (利率处于相对低位)

    # 确认信号数
    min_signals_required: 1       # 至少满足 1 个边际信号
    # 备注：后续若样本 N>100，可考虑收紧至 min_signals_required: 2

    # === 旧参数 (deprecated, 保留用于回测对比) ===
    # tips_yield_max: 0.5  # ZIRP-era absolute threshold, deprecated 2026-07-18
    # tips_yield_roc_60d_max: -0.10  # deprecated, superseded by tips_roc_60d_threshold

    # === v5.1 HY 豁免 RISK_ON (2026-07-18) ===
    # 相对路径 DXY z-score 门：对齐 compute_regime 读取键 (此前因键名错位未生效)
    dxy_zscore_60d_max: -0.5     # DXY 60日 z-score <= -0.5 (美元走弱) 满足相对路径
    # HY 豁免 RISK_ON：信用极宽松 + 低波动 = 风险偏好状态，绕过 TIPS/DXY 水平门
    vix_calm_max: 18.0           # VIX <= 18 (低于长期中位数 20)
    hy_calm_max: 300.0           # HY <= 300bp (信用市场极度健康)
    dxy_max: 100.0  # 保留：DXY 绝对水平仍作为绝对回退参考
  tight_liquidity:
    tips_yield_min: 0.8
    dxy_min: 103.0
    hy_tight_floor: 300.0  # P1(v5.1): 信用宽松降级门 — HY 低于此值(信用宽松)时 TIGHT 降级为 TRANSITION
  liquidity_squeeze:
    vix_min: 25.0
    hy_credit_spread_min: 400

scoring:
  weights:
    regime_base: 0.4
    trend_strength: 0.25
    volatility_adjust: 0.20
    liquidity_adjust: 0.15
  confidence:
    high_min: 0.7
    medium_min: 0.4
    low_max: 0.4
  risk:
    max_score: 1.0
    min_score: 0.0

decision:
  long_confidence_min: 0.60
  short_confidence_min: 0.65
  no_trade_confidence_max: 0.35
  reduce_threshold: 0.30

system:
  mcp_timeout_seconds: 8
  max_retries: 3
  scheduler_interval_minutes: 15
  replay_batch_size: 100

constitution:
  red_lines:
    vix_escape_hatch: 40.0
    core_pce_max: 3.5
    # HY 信用利差物理夺权线（bp）。
    # 与 regime.liquidity_squeeze.hy_credit_spread_min: 400 拆档：
    #   400 = regime 入门标签；600 = pre-kernel 物理红线夺权。
    # 量纲守卫：必须是 bp（数百），绝非 0-6 的小数——防止“尺度 bug”误触。
    hy_credit_spread_bp: 600.0
    # brent_red_line 默认**禁用**：brent_shock 仅由 Pine 桥（CDP）注入，不在
    # TV MCP -> build_features 主路径里，pre-kernel 折叠阶段没有该特征，会出现
    # “静默死规则”（永远跳过、假保护）。重接方式：为 FeatureSchema 增加 brent_shock
    # 字段 + build_features 透传 + 提供布伦特数据源（如 TVC:UKOIL），再取消下行注释。
    # brent_red_line: 95.0
  execution:
    max_daily_turnover: 0.25
    min_cash_buffer: 0.05

feedback:
  learning_rate: 0.1
  min_weight: 0.2
  max_weight: 1.8
  soft_damping: 0.9
  max_delta: 0.5

shadow:
  di_threshold: 0.8
  rds_threshold: 0.6
  consecutive_bars: 3

health:
  mdi_threshold_low: 0.35
  mdi_threshold_high: 0.70
  pnl_stability_threshold: 0.3

safety:
  reduced_risk_budget: 0.3
  degraded_risk_budget: 0.0

stability:
  dpe_threshold: 1.2
  flip_count_threshold: 4
  flip_rate_threshold: 0.3
  lag_tolerance_bars: 2
  window_size: 20
  regime_duration_minimum: 3

divergence:
  volume_price:
    threshold_ratio: 0.85
    score_bonus: 0.15
    min_score: 0.50
  lag_window_days: 30
  crack_age_min: 5
  budget:
    late_default: 0.50
    confirmed_breakdown: 0.0
    recovery_step: 0.10
    recovery_min_bars: 3

