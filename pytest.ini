[pytest]
# Marker convention for CI bucketing (see .github/workflows/ci.yml).
#   unit  -> fast, hermetic tests (default gating run: `pytest -m "not live"`)
#   live  -> require external services / env-specific (TradingView Desktop CDP bridge,
#           network, or locale/encoding-sensitive) and are isolated from the gating run.
markers =
    unit: Fast, hermetic unit tests. Collected by the default gating CI run.
    live: Tests requiring external services (TradingView Desktop CDP), network, or environment-specific encoding. Excluded from the gating run; executed in a separate, non-blocking step.
